name: Build, push and smoke-test agent image

on:
  push:
    branches: [main]
    paths:
      - main.py
      - Dockerfile
      - requirements.txt
      - .dockerignore
      - .github/workflows/docker-build.yml
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-push-smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # linux/amd64 is native on this runner (no QEMU needed) — this is the
      # exact platform the judging VM pulls, so a successful push here closes
      # the "untested cross-build" gap called out in HANDOFF.md.
      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify pushed manifest is linux/amd64
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE }}:${{ github.sha }} | tee manifest.txt
          grep -q "linux/amd64" manifest.txt

      - name: Smoke test — run the container like the judging harness would
        run: |
          mkdir -p smoke_output
          # Deliberately fake Fireworks credentials: this proves the bundled
          # local model can classify + answer and that remote failures fall
          # back to it, without needing a real API key in CI.
          docker run --rm --platform linux/amd64 \
            -e FIREWORKS_API_KEY=dummy \
            -e FIREWORKS_BASE_URL=https://api.fireworks.ai/inference/v1 \
            -e ALLOWED_MODELS="accounts/fireworks/models/minimax-m3,accounts/fireworks/models/kimi-k2p7-code" \
            -e USE_GEMMA=false \
            -v "$(pwd)/input:/input:ro" \
            -v "$(pwd)/smoke_output:/output" \
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Validate output shape
        run: |
          test -s smoke_output/results.json
          test -s smoke_output/metrics.json
          python3 - <<'EOF'
          import json, sys
          tasks = json.load(open("input/tasks.json"))
          results = json.load(open("smoke_output/results.json"))
          want = {t["task_id"] for t in tasks}
          got = {r["task_id"] for r in results}
          assert got == want, f"task_id mismatch: {want ^ got}"
          empty = [r["task_id"] for r in results if not r["answer"].strip()]
          assert not empty, f"empty answers for: {empty}"
          print(f"OK: {len(results)}/{len(tasks)} tasks answered, none empty")
          EOF

      - name: Make the package public (first run only)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "If this is the first push, set the ghcr.io package visibility"
          echo "to Public once: github.com/${{ github.repository_owner }}?tab=packages"
          echo "-> package 'track-one-amd' -> Package settings -> Change visibility."
